name: Kernel Build (A10 MIUI)

on:
  workflow_dispatch:

env:
  DEFCONFIG: surya_defconfig
  KERNEL_NAME: NOS
  DEVICE: Surya

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-latest

    steps:
      - name: 🧹 Clean workspace
        run: |
          rm -rf *

      - name: 📥 Checkout kernel source
        uses: actions/checkout@v4

      - name: 📦 Setup Clang r383902b
        run: |
          mkdir -p clang
          curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+/refs/heads/master/clang-r383902b.tar.gz?format=TEXT
          base64 -d clang-r383902b.tar.gz?format=TEXT > clang.tar.gz
          tar -C clang -xzf clang.tar.gz

      - name: 📦 Setup GCC 4.9 toolchain
        run: |
          mkdir -p toolchain
          git clone --depth=1 -b lineage-19.1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git toolchain/gcc64
          git clone --depth=1 -b lineage-19.1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git toolchain/gcc32

      - name: ⚙️ Prepare environment
        run: |
          echo "CLANG_PATH=$(pwd)/clang/clang-r383902b" >> $GITHUB_ENV
          echo "GCC64_PATH=$(pwd)/toolchain/gcc64" >> $GITHUB_ENV
          echo "GCC32_PATH=$(pwd)/toolchain/gcc32" >> $GITHUB_ENV
          echo "OUT_DIR=$(pwd)/out" >> $GITHUB_ENV

      - name: 🛠️ Build Image.gz-dtb
        run: |
          export PATH="$CLANG_PATH/bin:$PATH"
          export LD_LIBRARY_PATH="$CLANG_PATH/lib:$LD_LIBRARY_PATH"
          export KBUILD_BUILD_USER="Mahirooo"
          export KBUILD_BUILD_HOST="hirateam"

          make O=$OUT_DIR ARCH=arm64 $DEFCONFIG
          make -j$(nproc) O=$OUT_DIR \
              ARCH=arm64 \
              CC=clang \
              LD=ld.lld \
              AR=llvm-ar \
              AS=llvm-as \
              NM=llvm-nm \
              OBJCOPY=llvm-objcopy \
              OBJDUMP=llvm-objdump \
              STRIP=llvm-strip \
              CROSS_COMPILE=$GCC64_PATH/bin/aarch64-linux-android- \
              CROSS_COMPILE_COMPAT=$GCC32_PATH/bin/arm-linux-androideabi- \
              CLANG_TRIPLE=aarch64-linux-gnu- \
              Image.gz-dtb

      - name: 📁 Upload compiled Image.gz-dtb
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-dtb
          path: out/arch/arm64/boot/Image.gz-dtb
