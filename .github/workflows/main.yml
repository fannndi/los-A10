name: Kernel Build (A10 MIUI)

on:
  workflow_dispatch:

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  BUILD_USER: fannndi
  BUILD_HOST: github

jobs:
  build:
    name: Compile Kernel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Set Timezone & Vars
        run: |
          sudo ln -sf /usr/share/zoneinfo/Asia/Jakarta /etc/localtime
          TIME=$(date '+%Y%m%d-%H%M')
          BUILD_ID=$(date '+%Y%m%d%H%M%S')
          echo "TIME=$TIME" >> $GITHUB_ENV
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV
          echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Add 4GB Swap
        run: |
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc build-essential bison ccache curl flex git libssl-dev \
            libncurses-dev libxml2-utils lzop python-is-python3 rsync \
            unzip zip wget xz-utils make clang lld libelf-dev \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            device-tree-compiler

      - name: Download Clang (r416183b)
        run: |
          mkdir -p clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android12-release/clang-r416183b.tar.gz -O - | tar -xz -C clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Telegram - Build Started
        run: |
          MSG="🚀 *Kernel Build Started!*\n"
          MSG+="🧱 Defconfig: \`surya_defconfig\`\n"
          MSG+="🛠️ Clang: \`r416183b\`"
          curl -s -X POST https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ env.TELEGRAM_CHAT_ID }} \
            -d text="$MSG" \
            -d parse_mode=Markdown

      - name: Clean & Setup
        run: |
          rm -rf out *.zip AnyKernel3 log.txt defconfig_snapshot.config
          make mrproper

      - name: Setup Defconfig
        run: |
          make O=out ARCH=arm64 surya_defconfig

      - name: Compile Kernel (Image.gz-dtb only)
        run: |
          echo -e "\n📦 Starting compilation...\n"
          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            AS=llvm-as \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            CLANG_TRIPLE=aarch64-linux-android- \
            KCFLAGS="-Wno-error" \
            LOCALVERSION= \
            Image.gz-dtb | tee log.txt

          if [ ! -f out/arch/arm64/boot/Image.gz-dtb ]; then
            echo "::error ::Image.gz-dtb not generated!"
            exit 1
          fi

      - name: Save Final .config
        run: cp out/.config defconfig_snapshot.config

      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/rinnsakaguchi/AnyKernel3 -b FSociety
          cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3
          zip -r9 ../MIUI-A10-${{ env.TIME }}.zip ./* -x '*.git*' README.md *placeholder

      - name: Telegram - Build Success
        if: success()
        run: |
          DURATION=$(( $(date +%s) - ${{ env.BUILD_START }} ))
          MSG="✅ *Kernel Build Success!*\n"
          MSG+="🕒 *Time:* ${DURATION}s\n"
          MSG+="📦 *File:* \`MIUI-A10-${{ env.TIME }}.zip\`"
          curl -s -X POST https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ env.TELEGRAM_CHAT_ID }} \
            -d text="$MSG" \
            -d parse_mode=Markdown
          curl -s -F document=@MIUI-A10-${{ env.TIME }}.zip \
            -F caption="✅ Kernel Zip" \
            -F chat_id=${{ env.TELEGRAM_CHAT_ID }} \
            https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendDocument

      - name: Telegram - Log Upload
        if: always()
        run: |
          curl -s -F document=@log.txt \
            -F caption="📄 Build Log" \
            -F chat_id=${{ env.TELEGRAM_CHAT_ID }} \
            https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendDocument

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel Image
          path: |
            MIUI-A10-${{ env.TIME }}.zip
            log.txt
            defconfig_snapshot.config

      - name: Turn off Swap
        if: always()
        run: sudo swapoff /swapfile
